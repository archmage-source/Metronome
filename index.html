<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Pro Metronome+</title>

<style>
:root{
  --bg:#070A12;
  --panel:rgba(255,255,255,0.06);
  --text:#E6EAF2;
  --accent:#5EEAD4;
  --accent2:#38BDF8;
}

body.light{
  --bg:#f3f6fb;
  --panel:rgba(0,0,0,0.05);
  --text:#0f172a;
  --accent:#0ea5e9;
  --accent2:#6366f1;
}

/* GLOBAL FIX */
html,body{
  margin:0;
  padding:0;
  height:100%;
  background: radial-gradient(circle at top, #0B1220, var(--bg));
  color:var(--text);
  font-family: system-ui;
  overflow:hidden;
}

/* FULL SCREEN FIT */
body{
  height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* APP LAYOUT FIX */
.app{
  width:100%;
  max-width:460px;
  height:100dvh;
  padding:14px;
  box-sizing:border-box;
  display:flex;
  align-items:center;
}

.card{
  width:100%;
  height:100%;
  background:var(--panel);
  border-radius:20px;
  padding:14px;
  box-sizing:border-box;
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.08);

  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:8px;
  text-align:center;
}

/* BPM */
.bpm{
  font-size:40px;
  font-weight:700;
  background: linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CANVAS */
canvas{
  margin:0 auto;
  display:block;
}

/* TIME SIG */
.ts{
  display:flex;
  justify-content:center;
  gap:10px;
}

.ts input{
  width:60px;
  padding:8px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:var(--text);
  text-align:center;
}

/* SELECTS */
select{
  width:100%;
  padding:8px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:var(--text);
}

/* ACCENTS FIXED VISIBILITY */
.accents{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  min-height:42px;
}

.accents button{
  width:32px;
  height:32px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:var(--text);
}

.accents button.active{
  background:var(--accent);
  color:#001018;
}

/* CONTROLS */
.controls{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:600;
}

.primary{background:var(--accent);color:#001018;}
.secondary{background:rgba(255,255,255,0.08);color:var(--text);}
.danger{background:#ef4444;color:white;}

/* MOBILE TIGHTENING */
@media (max-width:600px){
  .bpm{font-size:34px;}
  .card{padding:10px;}
}
</style>
</head>

<body>

<div class="app">
<div class="card">

<div class="bpm" id="bpmDisplay">120</div>

<canvas id="dial"></canvas>

<input type="range" id="slider" min="20" max="400" value="120"/>

<div class="ts">
<input id="tsTop" type="number" value="4"/>
<div>/</div>
<input id="tsBottom" type="number" value="4"/>
</div>

<select id="subdiv">
<option value="1">Quarter Notes</option>
<option value="2">8th Notes</option>
<option value="3">Triplets</option>
<option value="4">16th Notes</option>
</select>

<div class="accents" id="accents"></div>

<select id="presetSelect"></select>

<div class="controls">
<button class="primary" id="start">Play</button>
<button class="secondary" id="theme">Theme</button>
<button class="secondary" id="load">Load</button>
<button class="danger" id="save">Save</button>
<button class="secondary" id="clear">Clear</button>
</div>

</div>
</div>

<script>
/* ---------------- DEVICE ---------------- */
const isMobile = window.innerWidth < 700;

/* ---------------- STATE ---------------- */
let bpm=120;
let beatsPerBar=4;
let subdivision=1;
let accentPattern=[];
let accentFlash=[];
let step=0;
let playing=false;
let lastHitTime=0;

const canvas=document.getElementById("dial");
const ctx=canvas.getContext("2d");

const display=document.getElementById("bpmDisplay");
const slider=document.getElementById("slider");

/* ---------------- RESPONSIVE CANVAS FIX ---------------- */
let SIZE = isMobile ? 170 : 240;

function resizeCanvas(){
  const dpr = window.devicePixelRatio || 1;

  canvas.style.width = SIZE + "px";
  canvas.style.height = SIZE + "px";
  canvas.width = SIZE * dpr;
  canvas.height = SIZE * dpr;

  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resizeCanvas();

/* ---------------- AUDIO ---------------- */
let ctxAudio;

function ensureAudio(){
  if(!ctxAudio){
    ctxAudio = new (window.AudioContext||window.webkitAudioContext)();
  }
  ctxAudio.resume();
}

/* ---------------- VIBRATION ---------------- */
function vibrate(type){
  if(!isMobile || !navigator.vibrate) return;
  if(type==="accent") navigator.vibrate(80);
  else if(type==="beat") navigator.vibrate(35);
  else navigator.vibrate(15);
}

/* ---------------- DRAW FIXED ---------------- */
function draw(){
ctx.clearRect(0,0,SIZE,SIZE);

let c = SIZE/2;
let r = SIZE/2 - 20;

let now=performance.now();
let pulse = playing ? Math.max(0, 1 - (now-lastHitTime)/(60000/bpm)) : 0;

ctx.beginPath();
ctx.arc(c,c,r,0,Math.PI*2);
ctx.strokeStyle="rgba(255,255,255,0.08)";
ctx.lineWidth=3;
ctx.stroke();

if(playing){
ctx.beginPath();
ctx.arc(c,c,r + pulse*12,0,Math.PI*2);
ctx.strokeStyle=`rgba(94,234,212,${pulse})`;
ctx.lineWidth=4;
ctx.stroke();
}

let totalSteps=beatsPerBar*subdivision;
let pos=step/totalSteps;
let angle = pos*Math.PI*2 - Math.PI/2;

ctx.beginPath();
ctx.moveTo(c,c);
ctx.lineTo(c+Math.cos(angle)*r,c+Math.sin(angle)*r);
ctx.strokeStyle="#fff";
ctx.lineWidth=2;
ctx.stroke();
}

/* ---------------- BPM ---------------- */
function setBpm(v){
bpm=Math.max(20,Math.min(400,Math.round(v)));
display.textContent=bpm;
slider.value=bpm;
}
slider.oninput=()=>setBpm(slider.value);

/* ---------------- ACCENTS FIXED ---------------- */
function renderAccents(){
const div=document.getElementById("accents");
div.innerHTML="";

for(let i=0;i<beatsPerBar;i++){
let b=document.createElement("button");
b.textContent=i+1;

if(accentPattern[i]) b.classList.add("active");

b.onclick=()=>{
accentPattern[i]=!accentPattern[i];
b.classList.toggle("active");
};

div.appendChild(b);
}
}

/* ---------------- CLICK ---------------- */
function click(){
ensureAudio();

let beatIndex=Math.floor(step/subdivision)%beatsPerBar;
let isMain=step%subdivision===0;
let accent=isMain&&accentPattern[beatIndex];

if(accent){
accentFlash[beatIndex]=performance.now();
vibrate("accent");
}else if(isMain){
vibrate("beat");
}else{
vibrate("sub");
}

let o=ctxAudio.createOscillator();
let g=ctxAudio.createGain();

o.frequency.value=accent?1400:isMain?900:600;
g.gain.value=accent?0.9:isMain?0.5:0.25;

o.connect(g);
g.connect(ctxAudio.destination);

o.start();
o.stop(ctxAudio.currentTime+0.05);

lastHitTime=performance.now();
step++;
}

/* ---------------- LOOP ---------------- */
let interval;
function loop(){
if(!playing)return;
click();
interval=setTimeout(loop,60000/(bpm*subdivision));
}

/* ---------------- START ---------------- */
document.getElementById("start").onclick=()=>{
playing=!playing;
if(playing){ensureAudio();loop();} else {clearTimeout(interval);}
document.getElementById("start").textContent=playing?"Pause":"Play";
};

/* ---------------- INIT ---------------- */
function init(){
accentPattern=new Array(beatsPerBar).fill(false);
accentPattern[0]=true;
accentFlash=new Array(beatsPerBar).fill(0);

setBpm(120);
renderAccents();
}
init();

function animate(){
draw();
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
