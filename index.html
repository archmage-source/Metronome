<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Metronome+</title>

<style>
:root{
  --bg:#070A12;
  --panel:rgba(255,255,255,0.06);
  --text:#E6EAF2;
  --muted:#8B93A7;
  --accent:#5EEAD4;
  --accent2:#38BDF8;
  --orange:#F59E0B;
}

body.light{
  --bg:#f3f6fb;
  --panel:rgba(0,0,0,0.05);
  --text:#0f172a;
  --muted:#334155;
  --accent:#0ea5e9;
  --accent2:#6366f1;
  --orange:#f97316;
}

body{
  margin:0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0B1220, var(--bg));
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{width:100%;max-width:460px;padding:20px;}

.card{
  background:var(--panel);
  border-radius:24px;
  padding:22px;
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
}

.bpm{
  font-size:54px;
  font-weight:700;
  margin:10px 0;
  background: linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

canvas{display:block;margin:10px auto;}

.ts{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.ts input{
  width:70px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:var(--text);
  text-align:center;
}

select{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:var(--text);
}

.accents{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-top:12px;
}

.accents button{
  width:34px;height:34px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:var(--text);
}

.accents button.active{
  background:var(--accent);
  color:#001018;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}

.primary{background:var(--accent);color:#001018;}
.secondary{background:rgba(255,255,255,0.08);color:var(--text);}
.danger{background:#ef4444;color:white;}
</style>
</head>

<body>
<div class="app">
<div class="card">

<div class="bpm" id="bpmDisplay">120</div>
<canvas id="dial" width="240" height="240"></canvas>

<input type="range" id="slider" min="20" max="400" value="120"/>

<div class="ts">
<input id="tsTop" type="number" value="4"/>
<div>/</div>
<input id="tsBottom" type="number" value="4"/>
</div>

<select id="subdiv">
<option value="1">Quarter Notes</option>
<option value="2">8th Notes</option>
<option value="3">Triplets</option>
<option value="4">16th Notes</option>
</select>

<div class="accents" id="accents"></div>

<select id="presetSelect"></select>

<div class="controls">
<button class="primary" id="start">Play</button>
<button class="secondary" id="theme">Theme</button>
<button class="secondary" id="load">Load</button>
<button class="danger" id="save">Save</button>
<button class="secondary" id="clear">Clear</button>
</div>

</div>
</div>

<script>
let bpm=120;
let beatsPerBar=4;
let subdivision=1;
let accentPattern=[];
let accentFlash=[];
let step=0;
let playing=false;
let lastHitTime=0;

const PRESET_KEY = "metronome_presets";
const MAX_PRESETS = 10;

const canvas=document.getElementById("dial");
const ctx=canvas.getContext("2d");

const display=document.getElementById("bpmDisplay");
const slider=document.getElementById("slider");

// ---------------- PRESETS ----------------
function getPresets(){
  return JSON.parse(localStorage.getItem(PRESET_KEY) || "[]");
}

function setPresets(p){
  localStorage.setItem(PRESET_KEY, JSON.stringify(p));
}

function refreshPresetUI(){
  const select = document.getElementById("presetSelect");
  select.innerHTML = "";

  const presets = getPresets();

  for(let i=0;i<MAX_PRESETS;i++){
    const opt = document.createElement("option");
    opt.value = i;

    const p = presets[i];
    opt.textContent = p
      ? `Preset ${i+1} (${p.bpm} BPM)`
      : `Preset ${i+1} (empty)`;

    select.appendChild(opt);
  }
}

// ---------------- DRAW ----------------
function draw(){
ctx.clearRect(0,0,240,240);
let c=120,r=90;

let now=performance.now();
let timeSinceHit = now - lastHitTime;
let pulse = playing ? Math.max(0, 1 - timeSinceHit / (60000 / bpm)) : 0;

ctx.beginPath();
ctx.arc(c,c,r,0,Math.PI*2);
ctx.strokeStyle="rgba(255,255,255,0.08)";
ctx.lineWidth=4;
ctx.stroke();

if(playing){
ctx.beginPath();
ctx.arc(c,c,r + pulse*18,0,Math.PI*2);
ctx.strokeStyle=`rgba(94,234,212,${pulse})`;
ctx.lineWidth=5;
ctx.stroke();
}

let totalSteps=beatsPerBar*subdivision;
let pos=step/totalSteps;
let needleAngle = pos * Math.PI * 2 - Math.PI / 2;

ctx.beginPath();
ctx.moveTo(c,c);
ctx.lineTo(c+Math.cos(needleAngle)*r,c+Math.sin(needleAngle)*r);
ctx.strokeStyle="white";
ctx.lineWidth=2;
ctx.stroke();

for(let i=0;i<beatsPerBar;i++){
if(accentPattern[i]){

let a = (i / beatsPerBar) * Math.PI * 2 - Math.PI / 2;

let nowTime = performance.now();
let age = nowTime - (accentFlash[i] || 0);
let isFlashing = age < 120;
let pop = isFlashing ? (1 - age / 120) : 0;

let isOne = i === 0;

let radius = r + 12 + (isOne ? 6 : 0) + pop * 6;

let x = c + Math.cos(a) * radius;
let y = c + Math.sin(a) * radius;

ctx.beginPath();
ctx.arc(x,y,isOne ? 7 : 5 + pop*2,0,Math.PI*2);

ctx.fillStyle = isOne ? "#FFB020" : "#F59E0B";

ctx.shadowColor = ctx.fillStyle;
ctx.shadowBlur = 10 + pop*20;

ctx.fill();
ctx.shadowBlur = 0;
}
}
}

// ---------------- BPM ----------------
function setBpm(v){
bpm=Math.max(20,Math.min(400,Math.round(v)));
display.textContent=bpm;
slider.value=bpm;
}
slider.oninput=()=>setBpm(slider.value);

// ---------------- TIME ----------------
function updateTimeSignature(){
let top=parseInt(document.getElementById("tsTop").value)||4;
beatsPerBar=top;

step=0;
accentPattern=new Array(beatsPerBar).fill(false);
accentPattern[0]=true;

accentFlash=new Array(beatsPerBar).fill(0);

renderAccents();
}
document.getElementById("tsTop").oninput=updateTimeSignature;
document.getElementById("tsBottom").oninput=updateTimeSignature;

// ---------------- ACCENTS ----------------
function renderAccents(){
const div=document.getElementById("accents");
div.innerHTML="";

for(let i=0;i<beatsPerBar;i++){
let b=document.createElement("button");
b.textContent=i+1;

if(accentPattern[i]) b.classList.add("active");

b.onclick=()=>{
accentPattern[i]=!accentPattern[i];
b.classList.toggle("active");
};

div.appendChild(b);
}
}

// ---------------- AUDIO ----------------
let ctxAudio=new (window.AudioContext||window.webkitAudioContext)();

function click(){
let beatIndex=Math.floor(step/subdivision)%beatsPerBar;
let isMain=step%subdivision===0;
let accent=isMain&&accentPattern[beatIndex];

if(accent){
accentFlash[beatIndex]=performance.now();
}

let o=ctxAudio.createOscillator();
let g=ctxAudio.createGain();

o.frequency.value=accent?1400:isMain?900:600;
g.gain.value=accent?0.9:isMain?0.5:0.25;

o.connect(g);
g.connect(ctxAudio.destination);

o.start();
o.stop(ctxAudio.currentTime+0.05);

lastHitTime = performance.now();
step++;
}

// ---------------- LOOP ----------------
let interval;
function loop(){
if(!playing)return;
click();
interval=setTimeout(loop,60000/(bpm*subdivision));
}

// ---------------- START ----------------
function start(){
playing=true;
loop();
document.getElementById("start").textContent="Pause";
}

function stop(){
playing=false;
clearTimeout(interval);
step=0;
document.getElementById("start").textContent="Play";
}

document.getElementById("start").onclick=()=>playing?stop():start();

// ---------------- SUBDIV ----------------
document.getElementById("subdiv").onchange=(e)=>{
subdivision=parseInt(e.target.value);
step=0;
};

// ---------------- THEME ----------------
document.getElementById("theme").onclick=()=>{
document.body.classList.toggle("light");
};

// ---------------- SAVE ----------------
document.getElementById("save").onclick = () => {
const index = parseInt(document.getElementById("presetSelect").value);
const presets = getPresets();

presets[index] = {
bpm,
beatsPerBar,
subdivision,
tsBottom: parseInt(document.getElementById("tsBottom").value) || 4,
accentPattern,
theme: document.body.className
};

setPresets(presets);
refreshPresetUI();
alert("Saved preset " + (index+1));
};

// ---------------- LOAD ----------------
document.getElementById("load").onclick = () => {
const index = parseInt(document.getElementById("presetSelect").value);
const presets = getPresets();
const p = presets[index];

if(!p){
alert("Empty preset");
return;
}

bpm = p.bpm;
beatsPerBar = p.beatsPerBar;
subdivision = p.subdivision;
accentPattern = p.accentPattern;

document.body.className = p.theme || "";

document.getElementById("tsTop").value = beatsPerBar;
document.getElementById("tsBottom").value = p.tsBottom || 4;

setBpm(bpm);
renderAccents();
document.getElementById("subdiv").value = subdivision;
};

// ---------------- CLEAR ----------------
document.getElementById("clear").onclick = () => {
const index = parseInt(document.getElementById("presetSelect").value);
const presets = getPresets();

presets[index] = {
bpm: 100,
beatsPerBar: 4,
subdivision: 1,
tsBottom: 4,
accentPattern: [true,false,false,false],
theme: document.body.className
};

setPresets(presets);
refreshPresetUI();

alert("Preset " + (index+1) + " cleared");

bpm = 100;
beatsPerBar = 4;
subdivision = 1;

setBpm(bpm);
document.getElementById("tsTop").value = 4;
document.getElementById("tsBottom").value = 4;
document.getElementById("subdiv").value = "1";

accentPattern = [true,false,false,false];
renderAccents();
};

// ---------------- INIT ----------------
function init(){
accentPattern=new Array(beatsPerBar).fill(false);
accentPattern[0]=true;

accentFlash=new Array(beatsPerBar).fill(0);

setBpm(120);
renderAccents();
refreshPresetUI();
}
init();

function animate(){
draw();
requestAnimationFrame(animate);
}
animate();

</script>
</body>
</html>
