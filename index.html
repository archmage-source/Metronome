<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Pro Metronome+</title>

<style>
:root{
  --bg:#070A12;
  --panel:rgba(255,255,255,0.06);
  --text:#E6EAF2;
  --accent:#5EEAD4;
  --accent2:#38BDF8;
}

body.light{
  --bg:#f3f6fb;
  --panel:rgba(0,0,0,0.05);
  --text:#0f172a;
  --accent:#0ea5e9;
  --accent2:#6366f1;
}

/* GLOBAL */
html,body{
  margin:0;
  padding:0;
  background: radial-gradient(circle at top, #0B1220, var(--bg));
  color:var(--text);
  font-family: system-ui;
  overflow:hidden; /* 🚫 no scrolling anywhere */
  height:100%;
}

/* MOBILE FULLSCREEN FIX */
body{
  height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  touch-action:none; /* 🚫 prevents scroll gestures on mobile */
}

/* APP WRAPPER */
.app{
  width:100%;
  max-width:460px;
  padding:20px;
  box-sizing:border-box;
}

/* MOBILE ADJUSTMENTS */
@media (max-width:600px){
  .app{
    padding:12px;
  }

  .card{
    padding:14px;
    border-radius:18px;
  }

  .bpm{
    font-size:42px;
  }

  canvas{
    width:180px !important;
    height:180px !important;
  }
}

.card{
  background:var(--panel);
  border-radius:24px;
  padding:22px;
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
}

.bpm{
  font-size:54px;
  font-weight:700;
  margin:10px 0;
  background: linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

canvas{
  display:block;
  margin:10px auto;
}

.ts{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.ts input{
  width:70px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:var(--text);
  text-align:center;
}

select{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:var(--text);
}

.accents{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-top:12px;
}

.accents button{
  width:34px;height:34px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:var(--text);
}

.accents button.active{
  background:var(--accent);
  color:#001018;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}

.primary{background:var(--accent);color:#001018;}
.secondary{background:rgba(255,255,255,0.08);color:var(--text);}
.danger{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="app">
<div class="card">

<div class="bpm" id="bpmDisplay">120</div>
<canvas id="dial" width="240" height="240"></canvas>

<input type="range" id="slider" min="20" max="400" value="120"/>

<div class="ts">
<input id="tsTop" type="number" value="4"/>
<div>/</div>
<input id="tsBottom" type="number" value="4"/>
</div>

<select id="subdiv">
<option value="1">Quarter Notes</option>
<option value="2">8th Notes</option>
<option value="3">Triplets</option>
<option value="4">16th Notes</option>
</select>

<div class="accents" id="accents"></div>

<select id="presetSelect"></select>

<div class="controls">
<button class="primary" id="start">Play</button>
<button class="secondary" id="theme">Theme</button>
<button class="secondary" id="load">Load</button>
<button class="danger" id="save">Save</button>
<button class="secondary" id="clear">Clear</button>
</div>

</div>
</div>

<script>
/* ---------------- DEVICE DETECTION ---------------- */
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

/* ---------------- VIBRATION ---------------- */
function vibrate(type){
  if(!isMobile || !navigator.vibrate) return;

  if(type === "accent") navigator.vibrate(80);
  else if(type === "beat") navigator.vibrate(40);
  else navigator.vibrate(15);
}

/* ---------------- STATE ---------------- */
let bpm=120;
let beatsPerBar=4;
let subdivision=1;
let accentPattern=[];
let accentFlash=[];
let step=0;
let playing=false;
let lastHitTime=0;

const PRESET_KEY = "metronome_presets";
const MAX_PRESETS = 10;

/* ---------------- CANVAS ---------------- */
const canvas=document.getElementById("dial");
const ctx=canvas.getContext("2d");

/* retina scaling */
function resizeCanvas(){
  const size = isMobile ? 180 : 240;
  const dpr = window.devicePixelRatio || 1;

  canvas.style.width = size+"px";
  canvas.style.height = size+"px";
  canvas.width = size*dpr;
  canvas.height = size*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resizeCanvas();

const display=document.getElementById("bpmDisplay");
const slider=document.getElementById("slider");

/* ---------------- AUDIO ---------------- */
let ctxAudio;

function ensureAudio(){
  if(!ctxAudio){
    ctxAudio = new (window.AudioContext||window.webkitAudioContext)();
  }
  if(ctxAudio.state === "suspended"){
    ctxAudio.resume();
  }
}

/* ---------------- PRESETS ---------------- */
function getPresets(){
  return JSON.parse(localStorage.getItem(PRESET_KEY) || "[]");
}
function setPresets(p){
  localStorage.setItem(PRESET_KEY, JSON.stringify(p));
}
function refreshPresetUI(){
  const select = document.getElementById("presetSelect");
  select.innerHTML = "";
  const presets = getPresets();

  for(let i=0;i<MAX_PRESETS;i++){
    const opt = document.createElement("option");
    opt.value = i;
    const p = presets[i];
    opt.textContent = p ? `Preset ${i+1} (${p.bpm} BPM)` : `Preset ${i+1} (empty)`;
    select.appendChild(opt);
  }
}

/* ---------------- DRAW ---------------- */
function draw(){
ctx.clearRect(0,0,240,240);
let c=120,r=90;

let now=performance.now();
let timeSinceHit = now - lastHitTime;
let pulse = playing ? Math.max(0, 1 - timeSinceHit / (60000 / bpm)) : 0;

ctx.beginPath();
ctx.arc(c,c,r,0,Math.PI*2);
ctx.strokeStyle="rgba(255,255,255,0.08)";
ctx.lineWidth=4;
ctx.stroke();

if(playing){
ctx.beginPath();
ctx.arc(c,c,r + pulse*18,0,Math.PI*2);
ctx.strokeStyle=`rgba(94,234,212,${pulse})`;
ctx.lineWidth=5;
ctx.stroke();
}

let totalSteps=beatsPerBar*subdivision;
let pos=step/totalSteps;
let needleAngle = pos * Math.PI * 2 - Math.PI / 2;

ctx.beginPath();
ctx.moveTo(c,c);
ctx.lineTo(c+Math.cos(needleAngle)*r,c+Math.sin(needleAngle)*r);
ctx.strokeStyle="white";
ctx.lineWidth=2;
ctx.stroke();
}

/* ---------------- BPM ---------------- */
function setBpm(v){
bpm=Math.max(20,Math.min(400,Math.round(v)));
display.textContent=bpm;
slider.value=bpm;
}
slider.oninput=()=>setBpm(slider.value);

/* ---------------- TIME ---------------- */
function updateTimeSignature(){
let top=parseInt(document.getElementById("tsTop").value)||4;
beatsPerBar=top;

step=0;
accentPattern=new Array(beatsPerBar).fill(false);
accentPattern[0]=true;

accentFlash=new Array(beatsPerBar).fill(0);
renderAccents();
}

/* ---------------- ACCENTS ---------------- */
function renderAccents(){
const div=document.getElementById("accents");
div.innerHTML="";

for(let i=0;i<beatsPerBar;i++){
let b=document.createElement("button");
b.textContent=i+1;

if(accentPattern[i]) b.classList.add("active");

b.onclick=()=> {
accentPattern[i]=!accentPattern[i];
b.classList.toggle("active");
};

div.appendChild(b);
}
}

/* ---------------- CLICK ---------------- */
function click(){
ensureAudio();

let beatIndex=Math.floor(step/subdivision)%beatsPerBar;
let isMain=step%subdivision===0;
let accent=isMain&&accentPattern[beatIndex];

if(accent){
accentFlash[beatIndex]=performance.now();
vibrate("accent");
} else if(isMain){
vibrate("beat");
} else {
vibrate("sub");
}

let o=ctxAudio.createOscillator();
let g=ctxAudio.createGain();

o.frequency.value=accent?1400:isMain?900:600;
g.gain.value=accent?0.9:isMain?0.5:0.25;

o.connect(g);
g.connect(ctxAudio.destination);

o.start();
o.stop(ctxAudio.currentTime+0.05);

lastHitTime = performance.now();
step++;
}

/* ---------------- LOOP ---------------- */
let interval;
function loop(){
if(!playing)return;
click();
interval=setTimeout(loop,60000/(bpm*subdivision));
}

/* ---------------- START/STOP ---------------- */
function start(){
playing=true;
ensureAudio();
loop();
document.getElementById("start").textContent="Pause";
}

function stop(){
playing=false;
clearTimeout(interval);
step=0;
document.getElementById("start").textContent="Play";
}

document.getElementById("start").onclick=()=>playing?stop():start();

/* ---------------- EVENTS ---------------- */
document.getElementById("tsTop").oninput=updateTimeSignature;

document.getElementById("subdiv").onchange=(e)=>{
subdivision=parseInt(e.target.value);
step=0;
};

document.getElementById("theme").onclick=()=>{
document.body.classList.toggle("light");
};

/* ---------------- INIT ---------------- */
function init(){
accentPattern=new Array(beatsPerBar).fill(false);
accentPattern[0]=true;

accentFlash=new Array(beatsPerBar).fill(0);

setBpm(120);
renderAccents();
refreshPresetUI();
}
init();

function animate(){
draw();
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
